<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student - QR Code Scan</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: url('https://media.gettyimages.com/id/1915806263/de/video/4k-social-networking-service-concept-communication-network.jpg?s=640x640&k=20&c=uVy7RVm9mIlAFIR3DBeY-rMSPbHnfvDcZ9j4Bfuteqk=') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      color: #00f5ff;
      font-weight: 800;
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00f5ff, 0 0 20px #00bfff;
    }

    /* 🔴 Logout Button */
    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 0, 0, 0.2);
      border: 2px solid #ff4b5c;
      color: #ff4b5c;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: #ff4b5c;
      color: #000;
    }

    .flip-btn {
      background-color: rgba(0, 191, 255, 0.2);
      border: 2px solid #00bfff;
      color: #00e0ff;
      padding: 10px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .scanner-container {
      background: rgba(0, 0, 30, 0.6);
      padding: 30px 20px;
      border-radius: 20px;
      border: 2px solid #00bfff;
      box-shadow: 0 0 30px #00bfff;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    video {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      border: 2px solid #00bfff;
      margin-bottom: 15px;
    }

    .confirmation-message {
      font-size: 1.5rem;
      margin-top: 10px;
    }

    canvas { display: none; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>

<body>

<!-- 🔴 Logout Button -->
<button class="logout-btn" onclick="logout()">Logout</button>

<h1>Scan QR Code</h1>
<button class="flip-btn" onclick="flipCamera()">Flip Camera</button>

<div class="scanner-container" id="scanner">
  <video id="video" autoplay playsinline></video>
  <p id="scannerText">Align QR inside frame</p>
</div>

<canvas id="canvas"></canvas>

<script>
/* 🔐 PROTECT PAGE */
const rollno = localStorage.getItem("rollno");

if (!rollno) {
  alert("Please login first");
  window.location.href = "login.html";
}

/* CAMERA + QR */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scanner = document.getElementById("scanner");

let stream;
let scanning = true;
let useBackCamera = true;

function startCamera() {
  stopCamera();
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: useBackCamera ? "environment" : "user" }
  })
  .then(s => {
    stream = s;
    video.srcObject = s;
    video.play();
    scanning = true;
    requestAnimationFrame(scanFrame);
  })
  .catch(() => {
    alert("Camera access denied");
  });
}

function stopCamera() {
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
}

function flipCamera() {
  useBackCamera = !useBackCamera;
  startCamera();
}

function scanFrame() {
  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const qr = jsQR(imageData.data, canvas.width, canvas.height);

    if (qr && qr.data) {
      stopCamera();

      const qrText = qr.data.trim();
      const dashIndex = qrText.indexOf("-");

      if (dashIndex === -1) {
        alert("Invalid QR");
        return;
      }

      const subject = qrText.substring(0, dashIndex).toLowerCase();
      const token = qrText;

      markAttendance(subject, token);
      return;
    }
  }
  requestAnimationFrame(scanFrame);
}

function markAttendance(subject, token) {
  fetch("http://localhost:5001/mark-attendance", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      rollno: rollno,
      subject: subject,
      token: token
    })
  })
  .then(async res => {
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    return data;
  })
  .then(data => {
    if (data.message === "Attendance already marked today") {
      scanner.innerHTML = `<p style="color:orange;">⚠️ ${data.message}</p>`;
    } else {
      scanner.innerHTML = `<h2>✅ ${data.message}</h2>`;
    }
  })
  .catch(err => {
    scanner.innerHTML = `<p style="color:red;">❌ ${err.message}</p>`;
  });
}

/* 🔴 LOGOUT FUNCTION */
function logout() {
  stopCamera();
  localStorage.clear();
  alert("Logged out successfully");
  window.location.href = "studentLogin.html";
}

window.onload = startCamera;
</script>

</body>
</html>
